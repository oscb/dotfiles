[metadata]
name = "git-stash"
description = "List and manage git stashes"
requirements = ["git"]

[source]
command = "git stash list"
output = "{split:::0}"
no_sort = true

[preview]
command = "git stash show -p --color=always '{split:::0}'"
ansi = true

[ui]
preview_panel = { size = 55 }

[keybindings]
enter = "actions:apply"
ctrl-d = "actions:drop"

[actions.apply]
description = "Apply the selected stash (keeps it)"
command = "git stash apply '{split:::0}'"
mode = "execute"

[actions.pop]
description = "Pop the selected stash (applies and drops)"
command = "git stash pop '{split:::0}'"
mode = "execute"

[actions.drop]
description = "Drop the selected stash"
command = "git stash drop '{split:::0}'"
mode = "fork"
