# Ollama per-machine config
ollama:
  # Shared
  serviceEnv:
    - 'OLLAMA_HOST=0.0.0.0'
    - 'OLLAMA_FLASH_ATTENTION=1'
    - 'OLLAMA_KV_CACHE_TYPE=q8_0'
  hosts:
    infinity:
      contextLength: 8192 # GTX 1080 (8GB)
      models:
        - gemma4:e2b
        - phi4-mini
        - minicpm-v4.6:latest
    aurora:
      contextLength: 32768 # 4070 Super (12GB)
      models:
        - gemma4:e2b
        - gemma4:e4b
        - minicpm-v4.6:latest
        - qwen3.5:9b
        - phi4-mini
